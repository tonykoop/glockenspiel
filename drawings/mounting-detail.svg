<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="800" height="480" fill="white" stroke="black" stroke-width="1"/>
<text x="64" y="36" font-size="14" font-weight="bold">Glockenspiel — Mounting Detail (section through node)</text>
<text x="64" y="54" font-size="11" fill="#444">Free-free bar isolated from walnut frame by rubber grommet + paracord. Stainless rod is backup restraint only.</text>

<!-- Bar (cross-section, looking down the bar length) -->
<rect x="200" y="180" width="240" height="60" fill="#e8e8e8" stroke="black" stroke-width="1.5"/>
<text x="320" y="215" font-size="11" text-anchor="middle">6061-T6 Aluminum bar (1.000" w × 0.250" t)</text>

<!-- Node hole (3/16 in dia, centered) -->
<circle cx="320" cy="210" r="14" fill="white" stroke="black" stroke-width="1.5"/>
<text x="320" y="214" font-size="9" text-anchor="middle">3/16"</text>

<!-- Paracord through hole -->
<line x1="280" y1="210" x2="380" y2="210" stroke="#a0522d" stroke-width="3"/>
<text x="385" y="208" font-size="10" fill="#a0522d">550 paracord</text>

<!-- Rubber grommet (pocket below bar in walnut frame) -->
<rect x="294" y="240" width="52" height="20" fill="#444" stroke="black" stroke-width="1"/>
<text x="350" y="256" font-size="10" fill="#444">rubber grommet (Shore 30A/50A/70A)</text>

<!-- Walnut frame rail (cross-section) -->
<rect x="100" y="260" width="440" height="80" fill="#5c3517" stroke="black" stroke-width="1.5"/>
<text x="320" y="305" font-size="11" text-anchor="middle" fill="white">Black Walnut frame rail (3/4" thick)</text>

<!-- Grommet pocket -->
<rect x="298" y="260" width="44" height="14" fill="white" stroke="#333" stroke-dasharray="2,2"/>
<text x="350" y="272" font-size="9" fill="#444">pocket</text>

<!-- 1/8 in stainless rod under bar (in section) -->
<circle cx="320" cy="358" r="6" fill="#bbb" stroke="black" stroke-width="1"/>
<text x="335" y="362" font-size="10" fill="#444">1/8" stainless rod (backup restraint)</text>

<!-- Annotations / callouts -->
<line x1="320" y1="180" x2="80" y2="120" stroke="#666" stroke-width="0.7"/>
<text x="80" y="115" font-size="10" fill="#444">Bar contact only at grommet → free-free mode preserved</text>

<line x1="280" y1="210" x2="80" y2="160" stroke="#666" stroke-width="0.7"/>
<text x="80" y="155" font-size="10" fill="#444">Cord captures bar through node hole</text>

<line x1="346" y1="270" x2="600" y2="160" stroke="#666" stroke-width="0.7"/>
<text x="600" y="155" font-size="10" fill="#444">Grommet seats in pre-routed pocket</text>

<line x1="320" y1="364" x2="600" y2="400" stroke="#666" stroke-width="0.7"/>
<text x="600" y="404" font-size="10" fill="#444">Rod must NOT contact bar — buzz risk</text>

<!-- Notes -->
<text x="64" y="430" font-size="10" fill="#444">• Cord tension: snug but not damping — should not bear weight.</text>
<text x="64" y="446" font-size="10" fill="#444">• Pilot three durometers (30A / 50A / 70A) on C5/A5/C7 before standardizing.</text>
<text x="64" y="462" font-size="10" fill="#444">• See `risks.md` for buzz-test pass criteria at three dynamics.</text>

<!-- Title block -->
<rect x="556" y="40" width="220" height="100" fill="white" stroke="black" stroke-width="1"/>
<text x="566" y="60" font-size="10" font-weight="bold">Mounting Detail</text>
<text x="566" y="78" font-size="9" fill="#444">Glockenspiel</text>
<text x="566" y="94" font-size="9" fill="#444">section through node hole</text>
<text x="566" y="110" font-size="9" fill="#444">cord + grommet + rod</text>
<text x="566" y="126" font-size="9" fill="#444">v4.3 · 2026-05-08 · sheet 1/1</text>
</svg>
